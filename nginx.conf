# Minimal nginx config for serving the Ansiform static SPA.
#
# Designed to run as a non-root user with a read-only root filesystem
# (council §5). All writable paths are redirected under /tmp so the container
# can be started with `--read-only` plus a tmpfs at /tmp.

worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Keep all runtime scratch space under /tmp (writable on a read-only FS).
  client_body_temp_path /tmp/nginx-client;
  proxy_temp_path /tmp/nginx-proxy;
  fastcgi_temp_path /tmp/nginx-fastcgi;
  uwsgi_temp_path /tmp/nginx-uwsgi;
  scgi_temp_path /tmp/nginx-scgi;

  access_log /dev/stdout;
  sendfile on;
  tcp_nopush on;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Zero-egress posture (council §5). `connect-src 'none'` blocks every
    # outbound request the page could make. Mirrors the build-time <meta> CSP.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Hashed assets are immutable; cache them hard.
    location /assets/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # SPA fallback: client-side routing (/tasks/:task) resolves to index.html.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
